<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santai Masajes - Reservas Premium</title>
    <style>
        /* ==========================================
           VARIABLES DE DISEÑO PREMIUM
           Paleta inspirada en Santai Masajes
           ========================================== */
        :root {
            /* Colores principales */
            --color-bg-dark: #1a1410;           /* Marrón oscuro profundo - fondos */
            --color-bg-medium: #2d2420;         /* Marrón medio - elementos secundarios */
            --color-bg-light: #f5f0eb;          /* Beige cálido - fondo chat */
            --color-cream: #faf7f4;             /* Crema suave - mensajes bot */
            
            /* Acentos elegantes */
            --color-gold: #c9a962;              /* Dorado suave - botones principales */
            --color-gold-hover: #b8984d;        /* Dorado oscuro - hover */
            --color-gold-light: #e8dcc8;        /* Dorado muy claro - bordes sutiles */
            
            /* Texto */
            --color-text-dark: #1a1410;         /* Texto oscuro sobre fondo claro */
            --color-text-light: #f5f0eb;        /* Texto claro sobre fondo oscuro */
            --color-text-muted: #8b7355;        /* Texto secundario/muted */
            
            /* Estados */
            --color-error: #a67c6b;             /* Marrón rojizo suave - errores elegantes */
            --color-success: #7a8b6e;           /* Verde musgo - éxito */
            --color-blocked: #3d3530;           /* Bloqueado - gris cálido */
            
            /* Dimensiones */
            --chat-width: 380px;
            --chat-height: 600px;
            --border-radius: 16px;
            --border-radius-soft: 24px;
        }

        /* ==========================================
           RESET Y BASE
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', 'Playfair Display', Georgia, serif;
            background: var(--color-bg-light);
            color: var(--color-text-dark);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Importar tipografía elegante */
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500&display=swap');

        /* ==========================================
           BOTÓN FLOTANTE DISCRETO
           ========================================== */
        .chat-trigger {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 64px;
            height: 64px;
            background: var(--color-bg-dark);
            border: 2px solid var(--color-gold);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(26, 20, 16, 0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        .chat-trigger:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 12px 40px rgba(26, 20, 16, 0.4);
            border-color: var(--color-gold-hover);
        }

        .chat-trigger.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.8);
        }

        .chat-trigger svg {
            width: 28px;
            height: 28px;
            fill: var(--color-gold);
            transition: transform 0.3s ease;
        }

        .chat-trigger:hover svg {
            transform: scale(1.1);
        }

        /* Indicador de notificación sutil */
        .chat-trigger::after {
            content: '';
            position: absolute;
            top: -2px;
            right: -2px;
            width: 14px;
            height: 14px;
            background: var(--color-gold);
            border-radius: 50%;
            border: 2px solid var(--color-bg-light);
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s ease;
        }

        .chat-trigger.has-notification::after {
            opacity: 1;
            transform: scale(1);
        }

        /* ==========================================
           VENTANA DE CHAT PREMIUM
           ========================================== */
        .chat-container {
            position: fixed;
            bottom: 100px;
            right: 32px;
            width: var(--chat-width);
            height: var(--chat-height);
            max-height: calc(100vh - 120px);
            background: var(--color-bg-light);
            border-radius: var(--border-radius);
            box-shadow: 0 24px 80px rgba(26, 20, 16, 0.35);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
            border: 1px solid var(--color-gold-light);
        }

        .chat-container.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        /* ==========================================
           HEADER ELEGANTE
           ========================================== */
        .chat-header {
            background: var(--color-bg-dark);
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* Patrón decorativo sutil en header */
        .chat-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(201, 169, 98, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(201, 169, 98, 0.03) 0%, transparent 50%);
            pointer-events: none;
        }

        .chat-header-content {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            background: var(--color-bg-medium);
            border: 2px solid var(--color-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .chat-title-group h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 500;
            color: var(--color-text-light);
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .chat-status {
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            color: var(--color-gold);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-status::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #7a8b6e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-close {
            background: none;
            border: none;
            color: var(--color-gold);
            font-size: 28px;
            cursor: pointer;
            padding: 8px;
            line-height: 1;
            transition: all 0.3s ease;
            opacity: 0.8;
        }

        .chat-close:hover {
            opacity: 1;
            transform: rotate(90deg);
        }

        /* ==========================================
           ÁREA DE MENSAJES
           ========================================== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: 
                linear-gradient(to bottom, var(--color-bg-light) 0%, var(--color-cream) 100%);
        }

        /* Scrollbar elegante */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--color-gold-light);
            border-radius: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: var(--color-gold);
        }

        /* Burbujas de mensaje */
        .message {
            max-width: 85%;
            padding: 16px 20px;
            border-radius: var(--border-radius-soft);
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            line-height: 1.7;
            animation: messageIn 0.4s ease;
            position: relative;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            background: var(--color-cream);
            color: var(--color-text-dark);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 12px rgba(26, 20, 16, 0.06);
            border: 1px solid rgba(201, 169, 98, 0.15);
        }

        .message.user {
            background: var(--color-bg-dark);
            color: var(--color-text-light);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.error {
            background: #faf0ed;
            color: var(--color-error);
            border: 1px solid rgba(166, 124, 107, 0.3);
        }

        .message.warning {
            background: #faf8f0;
            color: #9a8b6e;
            border: 1px solid rgba(154, 139, 110, 0.3);
        }

        .message.blocked {
            background: var(--color-blocked);
            color: var(--color-text-light);
            text-align: center;
            max-width: 100%;
        }

        /* Tipografía elegante para mensajes del bot */
        .message.bot strong {
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--color-bg-dark);
            display: block;
            margin-bottom: 8px;
        }

        /* Separadores elegantes */
        .message-divider {
            text-align: center;
            margin: 8px 0;
            position: relative;
        }

        .message-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--color-gold-light), transparent);
        }

        .message-divider span {
            background: var(--color-cream);
            padding: 0 16px;
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
        }

        /* ==========================================
           BOTONES DE ACCIÓN ELEGANTES
           ========================================== */
        .chat-actions {
            padding: 20px 24px;
            background: var(--color-cream);
            border-top: 1px solid rgba(201, 169, 98, 0.15);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .action-btn {
            background: transparent;
            color: var(--color-bg-dark);
            border: 1.5px solid var(--color-gold);
            padding: 14px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--color-gold);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .action-btn:hover {
            color: var(--color-bg-dark);
            border-color: var(--color-gold);
            transform: translateX(4px);
        }

        .action-btn:hover::before {
            left: 0;
        }

        .action-btn.primary {
            background: var(--color-gold);
            color: var(--color-bg-dark);
            border-color: var(--color-gold);
        }

        .action-btn.primary:hover {
            background: var(--color-gold-hover);
            border-color: var(--color-gold-hover);
        }

        .action-btn.secondary {
            border-color: var(--color-text-muted);
            color: var(--color-text-muted);
        }

        .action-btn.secondary:hover {
            border-color: var(--color-bg-dark);
            color: var(--color-bg-dark);
        }

        .action-btn::before {
            z-index: 0;
        }

        .action-btn span {
            position: relative;
            z-index: 1;
        }

        /* Grid para múltiples opciones */
        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .actions-grid .action-btn {
            padding: 12px 16px;
            font-size: 12px;
        }

        /* ==========================================
           ÁREA DE INPUT
           ========================================== */
        .chat-input-area {
            padding: 20px 24px;
            background: var(--color-bg-light);
            border-top: 1px solid rgba(201, 169, 98, 0.15);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            background: var(--color-cream);
            border: 1.5px solid transparent;
            border-radius: 30px;
            padding: 14px 20px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            color: var(--color-text-dark);
            outline: none;
            transition: all 0.3s ease;
        }

        .chat-input::placeholder {
            color: var(--color-text-muted);
        }

        .chat-input:focus {
            border-color: var(--color-gold);
            background: var(--color-white);
        }

        .chat-input:disabled {
            background: #e8e4e0;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .chat-send {
            width: 48px;
            height: 48px;
            background: var(--color-bg-dark);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .chat-send:hover {
            background: var(--color-gold);
            transform: scale(1.05);
        }

        .chat-send:hover svg {
            fill: var(--color-bg-dark);
        }

        .chat-send:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .chat-send svg {
            width: 20px;
            height: 20px;
            fill: var(--color-gold);
            transition: fill 0.3s ease;
        }

        /* ==========================================
           INDICADOR DE ESCRITURA
           ========================================== */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: var(--color-cream);
            padding: 20px 24px;
            border-radius: var(--border-radius-soft);
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 12px rgba(26, 20, 16, 0.06);
        }

        .typing-indicator.active {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--color-gold);
            border-radius: 50%;
            animation: typingPulse 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingPulse {
            0%, 60%, 100% { 
                transform: scale(1);
                opacity: 0.4;
            }
            30% { 
                transform: scale(1.3);
                opacity: 1;
            }
        }

        /* ==========================================
           OVERLAY PARA MÓVIL
           ========================================== */
        .chat-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 85%;
            height: 85%;
            background: rgba(26, 20, 16, 0.4);
            backdrop-filter: blur(4px);
            z-index: 998;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .chat-overlay.active {
            display: block;
            opacity: 1;
        }

        /* ==========================================
           RESPONSIVE MOBILE-FIRST
           ========================================== */
        @media (max-width: 480px) {
            .chat-trigger {
                bottom: 20px;
                right: 20px;
                width: 56px;
                height: 56px;
            }

            .chat-container {
                width: 85vw;
                height: 85vh;
                max-height: 85vh;
                bottom: 0;
                right: 0;
                border-radius: 0;
                border: none;
            }

            .chat-header {
                padding: 20px;
            }

            .chat-messages {
                padding: 20px;
            }

            .chat-actions {
                padding: 16px 20px;
            }

            .actions-grid {
                grid-template-columns: 1fr;
            }

            .chat-input-area {
                padding: 16px 20px;
                padding-bottom: calc(16px + env(safe-area-inset-bottom));
            }
        }

        /* ==========================================
           ANIMACIONES ADICIONALES
           ========================================== */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(20px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Estado bloqueado - pantalla especial */
        .blocked-notice {
            text-align: center;
            padding: 40px 20px;
        }

        .blocked-notice-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .blocked-notice h4 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            margin-bottom: 12px;
            color: var(--color-text-light);
        }

        .blocked-notice p {
            font-size: 14px;
            opacity: 0.8;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <!-- Overlay para fondo en móvil -->
    <div class="chat-overlay" id="chatOverlay"></div>

    <!-- Botón flotante discreto -->
    <button class="chat-trigger" id="chatTrigger" aria-label="Iniciar conversación">
        <svg viewBox="0 0 24 24">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
        </svg>
    </button>

    <!-- Contenedor principal del chat -->
    <div class="chat-container" id="chatContainer">
        
        <!-- Header elegante -->
        <header class="chat-header">
            <div class="chat-header-content">
                <div class="chat-brand">
                    <div class="chat-avatar">S</div>
                    <div class="chat-title-group">
                        <h3>Santai Masajes</h3>
                        <div class="chat-status">Concierge Privado</div>
                    </div>
                </div>
                <button class="chat-close" id="chatClose" aria-label="Cerrar conversación">×</button>
            </div>
        </header>

        <!-- Área de mensajes -->
        <div class="chat-messages" id="chatMessages">
            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>

        <!-- Botones de acción dinámicos -->
        <div class="chat-actions" id="chatActions"></div>

        <!-- Input de texto -->
        <div class="chat-input-area">
            <input 
                type="text" 
                class="chat-input" 
                id="chatInput" 
                placeholder="Escribe su consulta..." 
                autocomplete="off"
            >
            <button class="chat-send" id="chatSend" aria-label="Enviar mensaje">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        /**
         * SANTAI CHATBOT - Sistema de Reservas Premium
         * Centro de Masajes Sensoriales - Barcelona
         * 
         * Arquitectura: Máquina de estados finita
         * Sin dependencias externas. Vanilla JS puro.
         */

        // ==========================================
        // CONFIGURACIÓN DEL SISTEMA
        // ==========================================
        
        const CONFIG = {
            // Palabras clave para reinicio global
            RESET_KEYWORDS: ['menu', 'inicio', 'volver', 'principal', 'opciones', 'empezar'],
            
            // Palabras prohibidas (tolerancia cero tras 2 advertencias)
            FORBIDDEN_WORDS: [
                'sexo', 'penetración', 'penetracion', 'coito', 
                'oral', 'anal', 'completo', 'todo incluido', 
                'final feliz', 'masaje con final', 'relación', 
                'cama', 'desnudo total', 'contacto íntimo'
            ],
            
            // Límites de seguridad
            MAX_DATE_ATTEMPTS: 2,
            MAX_FORBIDDEN_ATTEMPTS: 2,
            INACTIVITY_TIMEOUT: 5 * 60 * 1000, // 5 minutos
            
            // Horario de operación
            BUSINESS_HOURS: {
                open: 11,
                close: 21,
                days: [1, 2, 3, 4, 5, 6] // Lunes(1) a Sábado(6), Domingo(0) cerrado
            }
        };

        // ==========================================
        // BASE DE CONOCIMIENTO: FAQ PREMIUM
        // Respuestas elegantes, legales y discretas
        // ==========================================
        
        const FAQ_DATABASE = {
            'seguridad_discrecion': {
                keywords: ['seguro', 'segura', 'discreto', 'discreción', 'privacidad', 'anónimo'],
                question: '¿Es un servicio seguro y discreto?',
                answer: `Absolutamente. La confidencialidad es nuestro pilar fundamental. Disponemos de entrada privada independiente, sistema de citas escalonadas para garantizar su privacidad, y un equipo comprometido con el más estricto código deontológico. Su visita no dejará rastro alguno.`
            },
            
            'que_incluye': {
                keywords: ['incluye', 'qué hay', 'qué tiene', 'servicio', 'sesión incluye'],
                question: '¿Qué incluye exactamente la sesión?',
                answer: `Su experiencia incluye: bienvenida con infusiones selectas, uso de nuestras instalaciones con ducha privada, toallas de algodón egipcio, productos cosméticos de alta gama, y la sesión de masaje sensorial realizada íntegramente con técnicas manuales profesionales por terapeutas certificadas. Ambiente climatizado, música ambiental y aromaterapia personalizada.`
            },
            
            'limites_servicio': {
                keywords: ['práctica íntima', 'adicional', 'extra', 'completo', 'todo incluido', 'sexo', 'penetración', 'oral'],
                question: '¿Hay algún tipo de práctica íntima adicional?',
                answer: `Nuestro establecimiento ofrece exclusivamente masajes sensoriales y terapéuticos realizados con las manos. No proporcionamos ni toleramos solicitudes de servicios sexuales o prácticas íntimas de ningún tipo. Somos un centro de bienestar profesional regulado. Cualquier insinuación en este sentido resultará en la inmediata finalización de la conversación.`
            },
            
            'higiene': {
                keywords: ['higiene', 'limpio', 'limpieza', 'protocolo', 'covid', 'sanitario'],
                question: '¿Se cumple protocolo de higiene?',
                answer: `Mantenimos estándares hospitalarios de higiene. Todas nuestras cabinas se sanitizan integralmente tras cada sesión con productos certificados. El lino es de un solo uso y se procesa en lavandería industrial. Nuestras terapeutas siguen rigurosos protocolos de lavado de manos y utilizan equipamiento de protección cuando es pertinente. Su seguridad es prioridad absoluta.`
            },
            
            'elegir_masajista': {

        /**
         * Normaliza texto para comparaciones seguras
         * Elimina acentos, pasa a minúsculas, elimina espacios extra
         */
        function normalizeText(text) {
            return text
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        /**
         * Detecta palabras prohibidas en el texto
         * Retorna booleano
         */
        function detectForbiddenWords(text) {
            const normalized = normalizeText(text);
            return CONFIG.FORBIDDEN_WORDS.some(word => normalized.includes(word));
        }

        /**
         * Detecta palabras clave de reinicio
         */
        function detectResetKeyword(text) {
            const normalized = normalizeText(text);
            return CONFIG.RESET_KEYWORDS.some(keyword => normalized.includes(keyword));
        }

        /**
         * Intenta detectar pregunta FAQ basada en keywords
         * Retorna el ID de la FAQ o null
         */
        function detectFAQIntent(text) {
            const normalized = normalizeText(text);
            
            for (const [key, data] of Object.entries(FAQ_DATABASE)) {
                if (data.keywords.some(kw => normalized.includes(kw))) {
                    return key;
                }
            }
            return null;
        }

        /**
         * Valida fecha con reglas de negocio reales
         * Retorna objeto: { valid: boolean, error?: string, data?: object }
         */
        function validateDateTime(dateStr, timeStr = null) {
            // Validar formato fecha DD/MM/YYYY
            const dateRegex = /^(\d{2})\/(\d{2})\/(\d{4})$/;
            const dateMatch = dateStr.match(dateRegex);
            
            if (!dateMatch) {
                return { 
                    valid: false, 
                    error: 'El formato debe ser DD/MM/AAAA (ejemplo: 15/03/2024)' 
                };
            }

            const day = parseInt(dateMatch[1], 10);
            const month = parseInt(dateMatch[2], 10);
            const year = parseInt(dateMatch[3], 10);
            
            // Verificar mes válido
            if (month < 1 || month > 12) {
                return { valid: false, error: 'El mes debe estar entre 01 y 12' };
            }
            
            // Verificar día válido para el mes específico
            const daysInMonth = new Date(year, month, 0).getDate();
            if (day < 1 || day > daysInMonth) {
                return { 
                    valid: false, 
                    error: `El mes ${month} solo tiene ${daysInMonth} días. Por favor, verifique la fecha.` 
                };
            }

            // Crear objeto fecha
            const inputDate = new Date(year, month - 1, day);
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // Verificar fecha pasada
            if (inputDate < today) {
                return { valid: false, error: 'No es posible reservar para fechas pasadas' };
            }

            // Verificar domingo (0 = domingo)
            const dayOfWeek = inputDate.getDay();
            if (dayOfWeek === 0) {
                return { valid: false, error: 'Nuestro centro permanece cerrado los domingos. Le esperamos de lunes a sábado.' };
            }

            // Si se proporciona hora, validarla
            if (timeStr) {
                const timeRegex = /^(\d{2}):(\d{2})$/;
                const timeMatch = timeStr.match(timeRegex);
                
                if (!timeMatch) {
                    return { valid: false, error: 'Formato de hora inválido. Use HH:MM (ejemplo: 16:00)' };
                }

                const hour = parseInt(timeMatch[1], 10);
                const minute = parseInt(timeMatch[2], 10);

                // Validar rangos
                if (hour < 0 || hour > 23 || minute < 0 || minute > 59) {
                    return { valid: false, error: 'Hora inválida' };
                }

                // Validar horario comercial 11:00 - 21:00
                if (hour < 11 || hour >= 21) {
                    return { 
                        valid: false, 
                        error: 'Nuestro horario es de 11:00 a 21:00. Por favor, seleccione una hora dentro de este rango.' 
                    };
                }

                // Verificar si la fecha/hora ya pasó (para hoy)
                if (inputDate.getTime() === today.getTime()) {
                    const currentHour = new Date().getHours();
                    if (hour <= currentHour) {
                        return { valid: false, error: 'La hora seleccionada ya ha pasado para hoy' };
                    }
                }

                return { 
                    valid: true, 
                    data: { 
                        date: `${day.toString().padStart(2, '0')}/${month.toString().padStart(2, '0')}/${year}`,
                        time: `${hour.toString().padStart(2, '0')}:${minute.toString().padStart(2, '0')}`,
                        dayOfWeek: dayOfWeek
                    }
                };
            }

            return { 
                valid: true, 
                data: { 
                    date: `${day.toString().padStart(2, '0')}/${month.toString().padStart(2, '0')}/${year}`,
                    dayOfWeek: dayOfWeek
                }
            };
        }

        /**
         * Formatea fecha para display elegante
         */
        function formatDateElegant(dateStr) {
            const [day, month, year] = dateStr.split('/');
            const date = new Date(year, month - 1, day);
            const days = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
            const months = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 
                          'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
            
            return `${days[date.getDay()]}, ${day} de ${months[date.getMonth()]} de ${year}`;
        }

        /**
         * Delay asíncrono para simular escritura humana
         */
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        /**

        function addMessage(text, type = 'bot') {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            
            // Procesar negritas si las hay (formato: **texto**)
            const formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            msgDiv.innerHTML = formattedText;
            
            DOM.messages.insertBefore(msgDiv, DOM.typing);
            scrollToBottom();
            
            // Guardar en historial
            conversationState.messageHistory.push({ type, text, timestamp: Date.now() });
            
            return msgDiv;
        }

        function showTyping() {
            DOM.typing.classList.add('active');

         */
        function hideTyping() {
            DOM.typing.classList.remove('active');
        }

        /**
         * Respuesta del bot con delay natural
         */
        async function botResponse(text, delayTime = 800) {
            showTyping();
            await delay(delayTime);
            hideTyping();
            return addMessage(text, 'bot');
        }

        function scrollToBottom() {
            DOM.messages.scrollTop = DOM.messages.scrollHeight;

            const btn = document.createElement('button');
            btn.className = `action-btn ${options.primary ? 'primary' : ''} ${options.secondary ? 'secondary' : ''}`;
            btn.innerHTML = `<span>${text}</span>`;
            btn.onclick = onClick;
            if (options.disabled) btn.disabled = true;
            return btn;
        }

        // ==========================================
        // LÓGICA DE TRANSICIONES Y FLUJO

        /**
         * Transición segura entre estados
         */
        async function transitionTo(newState) {
            updateActivity();
            
            // Verificar si estamos bloqueados
            if (conversationState.current === 'bloqueado') return;
            
            // Verificar coherencia: si hay cambio de tipo de sesión en medio de reserva
            if (conversationState.sessionType && 
                (newState === 'individual' || newState === 'pareja') &&
                conversationState.sessionType !== newState &&
                !['menu', 'inicio'].includes(conversationState.current)) {
                
                if (!conversationState.pendingSwitch) {
                    conversationState.pendingSwitch = newState;
                    await botResponse(`Está en proceso de reservar una sesión ${conversationState.sessionType}. ¿Desea cancelarla y comenzar una nueva reserva para sesión ${newState}?`);
                    
                    clearActions();
                    addAction('Sí, nueva reserva', () => {
                        conversationState.sessionType = null;
                        conversationState.duration = null;
                        conversationState.date = null;
                        conversationState.time = null;
                        conversationState.pendingSwitch = null;
                        transitionTo(newState);
                    }, { primary: true });
                    
                    addAction('No, continuar actual', () => {
                        conversationState.pendingSwitch = null;
                        transitionTo(conversationState.current);
                    }, { secondary: true });
                    
                    return;
                }
            }
            
            // Resetear intentos al llegar a menú o inicio
            if (['menu', 'inicio'].includes(newState)) {
                conversationState.dateAttempts = 0;
            }
            
            // Ejecutar estado
            if (StateMachine[newState]) {
                await StateMachine[newState]();
            } else {
                console.error(`Estado no definido: ${newState}`);
            }
        }

         * Selección de duración

            conversationState.duration = minutes;
            transitionTo('reserva_fecha');
        }

        /**

            const faq = FAQ_DATABASE[faqKey];
            if (!faq) return;
            
            clearActions();
            await botResponse(`**${faq.question}**`);
            await botResponse(faq.answer, 600);
            
            await delay(400);
            
            addAction('Tengo otra pregunta', () => transitionTo('faq'), { secondary: true });
            addAction('Quiero reservar', () => transitionTo('menu'), { primary: true });
        }

        /**
         * Procesa texto ingresado según estado actual
         */
        async function processUserInput(text) {
            const trimmed = text.trim();
            if (!trimmed) return;
            
            updateActivity();
            
            // 1. Verificar palabras prohibidas (prioridad máxima)
            if (detectForbiddenWords(trimmed)) {
                conversationState.forbiddenAttempts++;
                
                if (conversationState.forbiddenAttempts >= CONFIG.MAX_FORBIDDEN_ATTEMPTS) {
                    await botResponse('Lamento informarle que no podemos atender solicitudes de ese tipo. Nuestro centro mantiene estrictos protocolos de profesionalidad.', 600);
                    await delay(800);
                    transitionTo('bloqueado');
                    return;
                }
                
                await botResponse('Debo aclararle que Santai Masajes es un centro de bienestar profesional. Ofrecemos exclusivamente masajes terapéuticos y sensoriales realizados con técnicas manuales certificadas. Cualquier otra solicitud queda fuera de nuestros servicios.', 800);
                return;
            }
            
            // 2. Verificar palabras de reinicio
            if (detectResetKeyword(trimmed)) {
                await botResponse('Volviendo al menú principal...', 400);
                resetConversation();
                return;
            }
            
            // 3. Máquina de estados para inputs libres
            switch (conversationState.current) {
                case 'faq':
                    await handleFAQInput(trimmed);
                    break;
                    
                case 'reserva_fecha':
                    await handleDateInput(trimmed);
                    break;
                    
                case 'reserva_datos':
                    await handlePersonalDataInput(trimmed);
                    break;
                    
                case 'contacto_email':
                    await handleEmailContactInput(trimmed);
                    break;
                    
                case 'menu':
                case 'inicio':
                    await botResponse('Por favor, seleccione una de las opciones disponibles o escriba "menu" para verlas de nuevo.');
                    break;
                    
                default:
                    await botResponse('No he comprendido su mensaje. Escriba "menu" para ver las opciones disponibles.');
            }
        }

        /**
         * Maneja input en estado FAQ (búsqueda inteligente)
         */
        async function handleFAQInput(text) {
            const faqKey = detectFAQIntent(text);
            
            if (faqKey) {
                await answerFAQ(faqKey);
            } else {
                await botResponse('No tengo una respuesta específica para esa consulta. Permítame sugerirle las preguntas más frecuentes:');
                transitionTo('faq');
            }
        }

        /**
         * Maneja input de fecha/hora con validación estricta
         */
        async function handleDateInput(text) {
            // Si solo tenemos fecha, pedimos hora
            if (!conversationState.date) {
                const validation = validateDateTime(text);
                
                if (!validation.valid) {
                    conversationState.dateAttempts++;
                    
                    if (conversationState.dateAttempts > CONFIG.MAX_DATE_ATTEMPTS) {
                        await botResponse(validation.error, 400);
                        await botResponse('Ha superado el número de intentos. Permíteme ayudarle de nuevo...', 600);
                        await delay(1000);
                        resetConversation();
                        return;
                    }
                    
                    const remaining = CONFIG.MAX_DATE_ATTEMPTS - conversationState.dateAttempts + 1;
                    await botResponse(validation.error, 400);
                    await botResponse(`Le queda ${remaining} intento. Por favor, verifique la fecha e intente de nuevo.`);
                    return;
                }
                
                // Fecha válida, guardar y pedir hora
                conversationState.date = validation.data.date;
                conversationState.dateAttempts = 0;
                
                await botResponse(`Fecha disponible: **${formatDateElegant(validation.data.date)}**`);
                await botResponse('¿A qué hora desea su sesión? (Formato: HH:MM, entre 11:00 y 21:00)');
                
                DOM.input.placeholder = 'HH:MM (ej: 16:30)';
                return;
            }
            
            // Ya tenemos fecha, ahora validamos hora
            const timeValidation = validateDateTime(conversationState.date, text);
            
            if (!timeValidation.valid) {
                conversationState.dateAttempts++;
                
                if (conversationState.dateAttempts > CONFIG.MAX_DATE_ATTEMPTS) {
                    await botResponse(timeValidation.error, 400);
                    await botResponse('Ha superado el número de intentos. Comencemos de nuevo...', 600);
                    await delay(1000);
                    resetConversation();
                    return;
                }
                
                await botResponse(timeValidation.error);
                return;
            }
            
            // Fecha y hora válidas
            conversationState.time = timeValidation.data.time;
            conversationState.dateAttempts = 0;
            transitionTo('reserva_datos');
        }

        /**
         * Maneja captura de datos personales en flujo de reserva
         */
        async function handlePersonalDataInput(text) {
            // Paso 1: Capturar nombre
            if (!conversationState.name) {
                if (text.length < 2) {
                    await botResponse('Por favor, indique su nombre completo para poder dirigirnos correctamente a usted.');
                    return;
                }
                
                conversationState.name = text;
                await botResponse(`Encantado, ${text.split(' ')[0]}.`);
                await botResponse('¿Podría facilitarme un número de teléfono móvil? Solo lo utilizaremos para confirmar su cita o comunicar cualquier imprevisto.');
                
                DOM.input.placeholder = '612 345 678';
                DOM.input.type = 'tel';
                return;
            }
            
            // Paso 2: Capturar teléfono
            if (!conversationState.phone) {
                // Validación básica teléfono español
                const cleanPhone = text.replace(/\s/g, '').replace(/^\+34/, '');
                const phoneRegex = /^[6789]\d{8}$/;
                
                if (!phoneRegex.test(cleanPhone)) {
                    await botResponse('El número no parece válido. Por favor, indique un móvil español de 9 dígitos (ejemplo: 612 345 678).');
                    return;
                }
                
                conversationState.phone = cleanPhone;
                DOM.input.type = 'text';
                transitionTo('confirmado');
            }
        }

        /**
         * Maneja flujo de contacto por email
         */
        async function handleEmailContactInput(text) {
            const step = conversationState.step || 'nombre';
            
            if (step === 'nombre') {
                if (text.length < 2) {
                    await botResponse('Por favor, indique su nombre.');
                    return;
                }
                conversationState.name = text;
                conversationState.step = 'email';
                
                await botResponse('Gracias. ¿Cuál es su dirección de email?');
                DOM.input.placeholder = 'su@email.com';
                DOM.input.type = 'email';
                return;
            }
            
            if (step === 'email') {
                // Validación básica email
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(text)) {
                    await botResponse('El formato del email no parece correcto. Por favor, verifíquelo.');
                    return;
                }
                
                conversationState.email = text;
                conversationState.step = 'consulta';
                
                await botResponse('Perfecto. ¿Cuál es el motivo de su consulta? Puede describir brevemente qué información necesita.');
                DOM.input.placeholder = 'Su consulta...';
                return;
            }
            
            if (step === 'consulta') {
                if (text.length < 10) {
                    await botResponse('Por favor, sea un poco más específico para que podamos ayudarle mejor (mínimo 10 caracteres).');
                    return;
                }
                
                conversationState.query = text;
                transitionTo('confirmado');
            }
        }

        // ==========================================
        // CONTROL GLOBAL DE LA CONVERSACIÓN
        // ==========================================

        /**
         * Reset completo de la conversación
         */
        function resetConversation() {
            // Preservar solo el historial para analytics si fuera necesario
            const history = conversationState.messageHistory;
            
            // Resetear estado
            Object.assign(conversationState, {
                current: 'menu',
                sessionType: null,
                duration: null,
                date: null,
                time: null,
                name: null,
                email: null,
                phone: null,
                query: null,
                dateAttempts: 0,
                forbiddenAttempts: 0,
                pendingSwitch: null,
                lastActivity: Date.now(),
                messageHistory: history
            });
            
            // Limpiar UI
            const messages = DOM.messages.querySelectorAll('.message');
            messages.forEach(m => m.remove());
            
            DOM.input.placeholder = 'Escriba su consulta...';
            DOM.input.type = 'text';
            
            // Restaurar typing indicator
            DOM.messages.appendChild(DOM.typing);
            
            transitionTo('menu');
        }

        /**
         * Actualiza timestamp de actividad
         */
        function updateActivity() {
            conversationState.lastActivity = Date.now();
        }

        /**
         * Verifica inactividad y reinicia si es necesario
         */
        function checkInactivity() {
            if (conversationState.current === 'bloqueado') return;
            
            const inactive = Date.now() - conversationState.lastActivity > CONFIG.INACTIVITY_TIMEOUT;
            
            if (inactive && conversationState.current !== 'menu') {
                addMessage('La conversación se ha reiniciado por inactividad.', 'bot');
                resetConversation();
            }
        }

        // ==========================================
        // INTERFAZ DE USUARIO
        // ==========================================

        /**
         * Toggle visibilidad del chat
         */
        function toggleChat() {
            const isActive = DOM.container.classList.contains('active');
            
            if (isActive) {
                DOM.container.classList.remove('active');
                DOM.trigger.classList.remove('hidden');
                DOM.overlay.classList.remove('active');
                document.body.style.overflow = '';
            } else {
                DOM.container.classList.add('active');
                DOM.trigger.classList.add('hidden');
                DOM.overlay.classList.add('active');
                document.body.style.overflow = 'hidden'; // Prevenir scroll de fondo en móvil
                
                // Iniciar conversación si es primera vez
                if (DOM.messages.querySelectorAll('.message').length === 0) {
                    transitionTo('inicio');
                }
                
                updateActivity();
            }
        }

        /**
         * Envía mensaje desde input
         */
        function sendMessage() {
            const text = DOM.input.value.trim();
            if (!text || DOM.input.disabled) return;
            
            addMessage(text, 'user');
            DOM.input.value = '';
            processUserInput(text);
        }

        // ==========================================
        // EVENT LISTENERS
        // ==========================================

        // Toggle chat
        DOM.trigger.addEventListener('click', toggleChat);
        DOM.close.addEventListener('click', toggleChat);
        DOM.overlay.addEventListener('click', toggleChat);

        // Input handlers
        DOM.send.addEventListener('click', sendMessage);
        
        DOM.input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Prevenir zoom en input en iOS
        DOM.input.addEventListener('focus', () => {
            if (window.innerWidth < 480) {
                document.body.style.zoom = '1';
            }
        });

        // Inactividad: verificar cada minuto
        setInterval(checkInactivity, 60000);

        // Prevenir menú contextual en elementos sensibles (opcional seguridad)
        DOM.container.addEventListener('contextmenu', (e) => {
            if (e.target.closest('.message')) {
                e.preventDefault();
            }
        });

        // ==========================================
        // INICIALIZACIÓN
        // ==========================================
        
        // Marcar como inicializado
        console.log('Santai Chatbot v1.0 - Sistema inicializado');
        
        // Notificación sutil tras 10 segundos (opcional)
        setTimeout(() => {
            if (!DOM.container.classList.contains('active')) {
                DOM.trigger.classList.add('has-notification');
            }
        }, 10000);

    </script>
</body>
</html>
