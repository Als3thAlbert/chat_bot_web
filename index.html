<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santai Masajes - Reservas Premium</title>
    <style>
        /* ==========================================
           VARIABLES DE DISEÑO PREMIUM
           Paleta inspirada en Santai Masajes
           ========================================== */
        :root {
            /* Colores principales */
            --color-bg-dark: #1a1410;           /* Marrón oscuro profundo - fondos */
            --color-bg-medium: #2d2420;         /* Marrón medio - elementos secundarios */
            --color-bg-light: #f5f0eb;          /* Beige cálido - fondo chat */
            --color-cream: #faf7f4;             /* Crema suave - mensajes bot */
            
            /* Acentos elegantes */
            --color-gold: #c9a962;              /* Dorado suave - botones principales */
            --color-gold-hover: #b8984d;        /* Dorado oscuro - hover */
            --color-gold-light: #e8dcc8;        /* Dorado muy claro - bordes sutiles */
            
            /* Texto */
            --color-text-dark: #1a1410;         /* Texto oscuro sobre fondo claro */
            --color-text-light: #f5f0eb;        /* Texto claro sobre fondo oscuro */
            --color-text-muted: #8b7355;        /* Texto secundario/muted */
            
            /* Estados */
            --color-error: #a67c6b;             /* Marrón rojizo suave - errores elegantes */
            --color-success: #7a8b6e;           /* Verde musgo - éxito */
            --color-blocked: #3d3530;           /* Bloqueado - gris cálido */
            
            /* Dimensiones */
            --chat-width: 380px;
            --chat-height: 600px;
            --border-radius: 16px;
            --border-radius-soft: 24px;
        }

        /* ==========================================
           RESET Y BASE
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', 'Playfair Display', Georgia, serif;
            background: var(--color-bg-light);
            color: var(--color-text-dark);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Importar tipografía elegante */
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500&display=swap');

        /* ==========================================
           BOTÓN FLOTANTE DISCRETO
           ========================================== */
        .chat-trigger {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 64px;
            height: 64px;
            background: var(--color-bg-dark);
            border: 2px solid var(--color-gold);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(26, 20, 16, 0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        .chat-trigger:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 12px 40px rgba(26, 20, 16, 0.4);
            border-color: var(--color-gold-hover);
        }

        .chat-trigger.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.8);
        }

        .chat-trigger svg {
            width: 28px;
            height: 28px;
            fill: var(--color-gold);
            transition: transform 0.3s ease;
        }

        .chat-trigger:hover svg {
            transform: scale(1.1);
        }

        /* Indicador de notificación sutil */
        .chat-trigger::after {
            content: '';
            position: absolute;
            top: -2px;
            right: -2px;
            width: 14px;
            height: 14px;
            background: var(--color-gold);
            border-radius: 50%;
            border: 2px solid var(--color-bg-light);
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s ease;
        }

        .chat-trigger.has-notification::after {
            opacity: 1;
            transform: scale(1);
        }

        /* ==========================================
           VENTANA DE CHAT PREMIUM
           ========================================== */
        .chat-container {
            position: fixed;
            bottom: 100px;
            right: 32px;
            width: var(--chat-width);
            height: var(--chat-height);
            max-height: calc(100vh - 120px);
            background: var(--color-bg-light);
            border-radius: var(--border-radius);
            box-shadow: 0 24px 80px rgba(26, 20, 16, 0.35);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
            border: 1px solid var(--color-gold-light);
        }

        .chat-container.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        /* ==========================================
           HEADER ELEGANTE
           ========================================== */
        .chat-header {
            background: var(--color-bg-dark);
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* Patrón decorativo sutil en header */
        .chat-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(201, 169, 98, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(201, 169, 98, 0.03) 0%, transparent 50%);
            pointer-events: none;
        }

        .chat-header-content {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            background: var(--color-bg-medium);
            border: 2px solid var(--color-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .chat-title-group h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 500;
            color: var(--color-text-light);
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .chat-status {
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            color: var(--color-gold);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-status::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #7a8b6e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-close {
            background: none;
            border: none;
            color: var(--color-gold);
            font-size: 28px;
            cursor: pointer;
            padding: 8px;
            line-height: 1;
            transition: all 0.3s ease;
            opacity: 0.8;
        }

        .chat-close:hover {
            opacity: 1;
            transform: rotate(90deg);
        }

        /* ==========================================
           ÁREA DE MENSAJES
           ========================================== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: 
                linear-gradient(to bottom, var(--color-bg-light) 0%, var(--color-cream) 100%);
        }

        /* Scrollbar elegante */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--color-gold-light);
            border-radius: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: var(--color-gold);
        }

        /* Burbujas de mensaje */
        .message {
            max-width: 85%;
            padding: 16px 20px;
            border-radius: var(--border-radius-soft);
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            line-height: 1.7;
            animation: messageIn 0.4s ease;
            position: relative;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            background: var(--color-cream);
            color: var(--color-text-dark);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 12px rgba(26, 20, 16, 0.06);
            border: 1px solid rgba(201, 169, 98, 0.15);
        }

        .message.user {
            background: var(--color-bg-dark);
            color: var(--color-text-light);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.error {
            background: #faf0ed;
            color: var(--color-error);
            border: 1px solid rgba(166, 124, 107, 0.3);
        }

        .message.warning {
            background: #faf8f0;
            color: #9a8b6e;
            border: 1px solid rgba(154, 139, 110, 0.3);
        }

        .message.blocked {
            background: var(--color-blocked);
            color: var(--color-text-light);
            text-align: center;
            max-width: 100%;
        }

        /* Tipografía elegante para mensajes del bot */
        .message.bot strong {
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--color-bg-dark);
            display: block;
            margin-bottom: 8px;
        }

        /* Separadores elegantes */
        .message-divider {
            text-align: center;
            margin: 8px 0;
            position: relative;
        }

        .message-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--color-gold-light), transparent);
        }

        .message-divider span {
            background: var(--color-cream);
            padding: 0 16px;
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
        }

        /* ==========================================
           BOTONES DE ACCIÓN ELEGANTES
           ========================================== */
        .chat-actions {
            padding: 20px 24px;
            background: var(--color-cream);
            border-top: 1px solid rgba(201, 169, 98, 0.15);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .action-btn {
            background: transparent;
            color: var(--color-bg-dark);
            border: 1.5px solid var(--color-gold);
            padding: 14px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--color-gold);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .action-btn:hover {
            color: var(--color-bg-dark);
            border-color: var(--color-gold);
            transform: translateX(4px);
        }

        .action-btn:hover::before {
            left: 0;
        }

        .action-btn.primary {
            background: var(--color-gold);
            color: var(--color-bg-dark);
            border-color: var(--color-gold);
        }

        .action-btn.primary:hover {
            background: var(--color-gold-hover);
            border-color: var(--color-gold-hover);
        }

        .action-btn.secondary {
            border-color: var(--color-text-muted);
            color: var(--color-text-muted);
        }

        .action-btn.secondary:hover {
            border-color: var(--color-bg-dark);
            color: var(--color-bg-dark);
        }

        .action-btn::before {
            z-index: 0;
        }

        .action-btn span {
            position: relative;
            z-index: 1;
        }

        /* Grid para múltiples opciones */
        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .actions-grid .action-btn {
            padding: 12px 16px;
            font-size: 12px;
        }

        /* ==========================================
           ÁREA DE INPUT
           ========================================== */
        .chat-input-area {
            padding: 20px 24px;
            background: var(--color-bg-light);
            border-top: 1px solid rgba(201, 169, 98, 0.15);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            background: var(--color-cream);
            border: 1.5px solid transparent;
            border-radius: 30px;
            padding: 14px 20px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            color: var(--color-text-dark);
            outline: none;
            transition: all 0.3s ease;
        }

        .chat-input::placeholder {
            color: var(--color-text-muted);
        }

        .chat-input:focus {
            border-color: var(--color-gold);
            background: var(--color-white);
        }

        .chat-input:disabled {
            background: #e8e4e0;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .chat-send {
            width: 48px;
            height: 48px;
            background: var(--color-bg-dark);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .chat-send:hover {
            background: var(--color-gold);
            transform: scale(1.05);
        }

        .chat-send:hover svg {
            fill: var(--color-bg-dark);
        }

        .chat-send:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .chat-send svg {
            width: 20px;
            height: 20px;
            fill: var(--color-gold);
            transition: fill 0.3s ease;
        }

        /* ==========================================
           INDICADOR DE ESCRITURA
           ========================================== */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: var(--color-cream);
            padding: 20px 24px;
            border-radius: var(--border-radius-soft);
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 12px rgba(26, 20, 16, 0.06);
        }

        .typing-indicator.active {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--color-gold);
            border-radius: 50%;
            animation: typingPulse 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingPulse {
            0%, 60%, 100% { 
                transform: scale(1);
                opacity: 0.4;
            }
            30% { 
                transform: scale(1.3);
                opacity: 1;
            }
        }

        /* ==========================================
           OVERLAY PARA MÓVIL
           ========================================== */
        .chat-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 20, 16, 0.4);
            backdrop-filter: blur(4px);
            z-index: 998;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .chat-overlay.active {
            display: block;
            opacity: 1;
        }

        /* ==========================================
           RESPONSIVE MOBILE-FIRST
           ========================================== */
        @media (max-width: 480px) {
            .chat-trigger {
                bottom: 20px;
                right: 20px;
                width: 56px;
                height: 56px;
            }

            .chat-container {
                width: 100vw;
                height: 100vh;
                max-height: 100vh;
                bottom: 0;
                right: 0;
                border-radius: 0;
                border: none;
            }

            .chat-header {
                padding: 20px;
            }

            .chat-messages {
                padding: 20px;
            }

            .chat-actions {
                padding: 16px 20px;
            }

            .actions-grid {
                grid-template-columns: 1fr;
            }

            .chat-input-area {
                padding: 16px 20px;
                padding-bottom: calc(16px + env(safe-area-inset-bottom));
            }
        }

        /* ==========================================
           ANIMACIONES ADICIONALES
           ========================================== */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(20px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Estado bloqueado - pantalla especial */
        .blocked-notice {
            text-align: center;
            padding: 40px 20px;
        }

        .blocked-notice-icon {
